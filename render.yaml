services:
  - type: web
    name: ladeapp
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build:backend && npm run build:frontend
    startCommand: npm run start --prefix backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_URL
        sync: false